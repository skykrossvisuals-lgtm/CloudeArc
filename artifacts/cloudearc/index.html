    <link rel="icon" type="image/png" href="/logo-icon.png" />
    <script>
      // Register the cross-origin isolation service worker required by WebContainers.
      // This injects COOP/COEP headers that Replit's proxy may otherwise strip.
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/coi-serviceworker.js").then(function(reg) {
          if (!navigator.serviceWorker.controller) {
            // SW was just installed. Reload as soon as it takes control so
            // it can inject COEP/COOP headers on the very next navigation.
            navigator.serviceWorker.addEventListener("controllerchange", function() {
              window.location.reload();
            });
          }
        }).catch(function(err) {
          console.warn("[coi-sw] registration failed:", err);
        });
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
